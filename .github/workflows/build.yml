name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows-x64
          - os: ubuntu-latest
            platform: linux-x64
          - os: macos-14
            platform: macos-arm64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Windows: Install Visual Studio Build Tools (C++ & CMake)
      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies
        run: bun install

      - name: Determine build environment
        id: build-env
        shell: bash
        run: |
          if [[ "${{ github.ref_name }}" == *"-canary"* ]]; then
            echo "env=canary" >> $GITHUB_OUTPUT
          else
            echo "env=stable" >> $GITHUB_OUTPUT
          fi

      - name: Build app (stable)
        if: steps.build-env.outputs.env == 'stable'
        run: bun run build:stable

      - name: Build app (canary)
        if: steps.build-env.outputs.env == 'canary'
        run: bun run build:canary

      - name: Zip outputs
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            powershell -Command "Compress-Archive -Path 'build\*\*' -DestinationPath 'release-${{ matrix.platform }}.zip' -Force"
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            # Encontrar a pasta .app ou o output e usar ditto
            TARGET=$(find build -type d -name "*.app" | head -n 1)
            [ -z "$TARGET" ] && TARGET=$(find build -type d -name "LoLBuildRandomizer-*" | head -n 1)
            ditto -c -k --sequesterRsrc --keepParent "$TARGET" "release-${{ matrix.platform }}.zip"
          else
            cd build
            zip -r ../release-${{ matrix.platform }}.zip .
            cd ..
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}
          path: release-${{ matrix.platform }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          merge-multiple: true

      - name: Determine prerelease
        id: release-type
        shell: bash
        run: |
          if [[ "${{ github.ref_name }}" == *"-canary"* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: all-artifacts/*
          draft: false
          prerelease: ${{ steps.release-type.outputs.prerelease == 'true' }}
          generate_release_notes: true
          body_path: RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
