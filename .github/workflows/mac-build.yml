name: Build for macOS

on:
  workflow_dispatch: # Permite rodar o workflow manualmente
  release:
    types: [created] # Roda automaticamente sempre que você cria uma Release nova

jobs:
  build-mac:
    name: Build on macOS
    runs-on: macos-latest

    steps:
      # 1. Baixa o código do seu repositório
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Instala o Bun na máquina do Mac
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # 3. Baixa as dependências
      - name: Install Dependencies
        run: bun install

      # 4. Roda o build (que agora no Mac, vai gerar a versão pra Mac)
      - name: Build Electrobun App
        run: bunx electrobun build

      # 5. Zipa a versão gerada (.app) pois subir pastas no GitHub dá erro de permissões
      - name: Zip Mac Build
        run: |
          # O Electrobun vai criar a pasta build/dev-mac-arm64 ou dev-mac-x64
          # Vamos encontrar qual foi e zipar o arquivo .app dentro dela!
          APP_DIR=$(find build -name "*.app" -type d | head -n 1)
          if [ -z "$APP_DIR" ]; then
            echo "Erro: Arquivo .app não encontrado no build!"
            exit 1
          fi
          
          # No Mac, o zip ideal preserva as permissões de execução do pacote
          ditto -c -k --sequesterRsrc --keepParent "$APP_DIR" "LoL-Build-Randomizer-Mac-v0.0.1.zip"

      # 6. Salva o Zip como um Artefato pra você baixar na aba 'Actions'
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-app-zip
          path: LoL-Build-Randomizer-Mac-v0.0.1.zip

      # 7. Auto-adiciona na Release se tiver sido ativado por ela
      - name: Upload to Release Action
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: LoL-Build-Randomizer-Mac-v0.0.1.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
