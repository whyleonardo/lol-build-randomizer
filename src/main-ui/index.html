<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LoL Build Randomizer</title>
  <link rel="stylesheet" href="views://main-ui/style.css">
  <script src="views://main-ui/index.js"></script>
</head>
<body>
  <div id="app">
    <!-- Header / Title Bar -->
    <header class="header">
      <div class="header-left">
        <span class="app-logo">🎲</span>
        <span class="app-title">Build Randomizer</span>
      </div>
      <div class="header-right">
        <span class="patch-badge" id="patchBadge">Loading...</span>
        <div class="lcu-status">
          <span class="lcu-dot" id="lcuDot"></span>
          <span id="lcuStatusText">Disconnected</span>
        </div>
      </div>
    </header>

    <!-- Controls Bar -->
    <div class="controls-bar">
      <div class="controls-left">
        <!-- Role Filter -->
        <div class="role-selector">
          <button class="role-btn active" data-role="any">Any</button>
          <button class="role-btn" data-role="top">Top</button>
          <button class="role-btn" data-role="jungle">Jungle</button>
          <button class="role-btn" data-role="mid">Mid</button>
          <button class="role-btn" data-role="adc">ADC</button>
          <button class="role-btn" data-role="support">Support</button>
        </div>
      </div>
      <div class="controls-right">
        <!-- Ultimate Bravery Toggle -->
        <div class="toggle-group" id="ubToggleGroup">
          <span class="toggle-label">🤪 Ultimate Bravery</span>
          <div class="toggle-switch" id="ubToggle"></div>
        </div>
      </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Champion Panel (Left) -->
      <div class="champion-panel" id="championPanel">
        <div class="empty-state" id="emptyState">
          <div class="empty-state-icon">⚔️</div>
          <div class="empty-state-text">Ready to Randomize</div>
          <div class="empty-state-hint">Click the button below to generate a random build</div>
        </div>

        <div id="championContent" style="display: none;">
          <div class="champion-splash">
            <div class="ub-indicator" id="ubIndicator">Ultimate Bravery</div>
            <img src="" alt="Champion Splash" id="championSplash">
          </div>
          <div class="champion-info">
            <div class="champion-name" id="championName">—</div>
            <div class="champion-title" id="championTitle">—</div>
            <div class="champion-tags" id="championTags"></div>
            <button class="lock-champion-btn" id="lockChampionBtn">
              🔓 Lock Champion
            </button>
          </div>

          <!-- Summoner Spells -->
          <div class="summoner-spells-section">
            <div class="section-title">Summoner Spells</div>
            <div class="summoner-spells" id="summonerSpells"></div>
          </div>
        </div>
      </div>

      <!-- Build Panel (Right) -->
      <div class="build-panel" id="buildPanel">
        <div class="empty-state" id="buildEmptyState">
          <div class="empty-state-icon">📋</div>
          <div class="empty-state-text">No Build Generated</div>
          <div class="empty-state-hint">Your randomized build will appear here</div>
        </div>

        <div id="buildContent" style="display: none;">
          <!-- Runes -->
          <div>
            <div class="section-title" style="margin-bottom: 10px;">Runes</div>
            <div class="runes-section" id="runesSection"></div>
          </div>

          <!-- Items -->
          <div class="items-section">
            <div class="section-title" style="margin-bottom: 12px;">Items</div>
            <div class="items-grid" id="itemsGrid"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Action Bar (Bottom) -->
    <div class="action-bar">
      <button class="btn btn-import" id="importRunesBtn" disabled>
        <span class="btn-icon">📥</span>
        Import Runes
      </button>
      <button class="btn btn-primary" id="randomizeBtn">
        <span class="btn-icon">🎲</span>
        Randomize Build
      </button>
      <button class="btn btn-import" id="importItemsBtn" disabled>
        <span class="btn-icon">📦</span>
        Import Items
      </button>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay hidden" id="loadingOverlay">
      <div class="loading-spinner"></div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>
  </div>
</body>
</html>
